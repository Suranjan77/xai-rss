<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>{% block title %}idigest{% endblock %}</title>
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['\\(', '\\)'], ['$', '$']],
      displayMath: [['\\[', '\\]'], ['$$', '$$']]
    },
    options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
  };
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>
  :root { --fg:#1a1a1a; --muted:#666; --line:#e6e6e6; --accent:#1a73e8; }
  * { box-sizing: border-box; }
  body { font-family:-apple-system,Segoe UI,Roboto,sans-serif; color:var(--fg);
         line-height:1.6; max-width:820px; margin:0 auto; padding:24px 18px; }
  a { color:var(--accent); text-decoration:none; } a:hover { text-decoration:underline; }
  header { display:flex; justify-content:space-between; align-items:center;
           border-bottom:1px solid var(--line); padding-bottom:12px; margin-bottom:20px; }
  header h1 { font-size:20px; margin:0; } header h1 a { color:var(--fg); }
  .muted { color:var(--muted); font-size:13px; }
  .badge { font-size:11px; padding:2px 8px; border-radius:10px; background:#eef; color:#447; }
  .badge.read { background:#e9f6ec; color:#2a7; } .badge.interesting { background:#fff3e0; color:#b76; }
  .badge.queued { background:#eef4ff; color:#36c; }
  .row { display:flex; gap:10px; align-items:baseline; padding:9px 0; border-bottom:1px solid var(--line); }
  .row .pos { color:var(--muted); font-variant-numeric:tabular-nums; min-width:28px; }
  .diff { color:var(--muted); font-size:12px; }
  form.inline { display:inline; } button, input[type=submit] { cursor:pointer; }
  button, .btn { font:inherit; padding:8px 14px; border:1px solid var(--line); border-radius:6px;
                 background:#fafafa; } .btn.primary, button.primary { background:var(--accent); color:#fff; border:none; }
  input[type=text] { font:inherit; padding:7px 10px; border:1px solid var(--line); border-radius:6px; width:100%; }
  figure { margin:18px 0; text-align:center; } figure img { max-width:100%; border:1px solid var(--line); border-radius:6px; }
  figcaption { color:var(--muted); font-size:13px; margin-top:6px; }
  blockquote { margin:16px 0; padding:8px 16px; background:#f4f6f8; border-left:3px solid #4a7; }
  .concepts span { display:inline-block; background:#f0f2f5; border-radius:10px; padding:2px 9px; margin:2px; font-size:12px; }
  .card { border:1px solid var(--line); border-radius:8px; padding:14px; margin:14px 0; }
</style>
</head>
<body>
<header>
  <h1><a href="/">📚 idigest</a></h1>
  <div class="muted">interpretability learning path</div>
</header>
{% block body %}{% endblock %}
</body>
</html>
